# Codex red-team profile
model_instructions_file = './redteam-mode/system-instructions.md'

[features]
hooks = true
automation = true

[automation]
mode = "assisted"
tool_priority = [
  "WebFetch",
  "Browser MCP",
  "IDA MCP",
  "JADX MCP",
  "Current AI Agent",
]
mcp_inventory_files = []
require_scope_for_network = true
allow_restricted_actions = false

[redteam.model_prompt_profiles]
"gpt-5.6*" = "Jailbreak.gpt-5.6.md"
"gpt-5.5*" = "Jailbreak.gpt-5.5.md"
"gpt-5.4*" = "Jailbreak.gpt-5.4.md"
default = "Jailbreak.default.md"

# Active adapters are explicit Python callables keyed by discovered tool name.
# [automation.adapters]
# "WebFetch" = "my_codex_adapters:web_fetch"
